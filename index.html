/* ------------------------------------------------------------
   Build a full, internally-consistent contractor record from a
   portfolio summary row. Apex uses the canonical record.
------------------------------------------------------------ */
const CPARS_CATS = ['Technical', 'Schedule', 'Cost Control', 'Management', 'Small Business'];
const RATING_BY_HEALTH = (h) =>
  h >= 90 ? 'Very Good' : h >= 78 ? 'Satisfactory' : h >= 60 ? 'Satisfactory' : h >= 45 ? 'Marginal' : 'Marginal';

// deterministic pseudo-random from string seed (so data is stable across renders)
function seedRand(seed) {
  let x = 0; for (let i=0;i<seed.length;i++) x = (x*31 + seed.charCodeAt(i)) >>> 0;
  return () => { x = (x*1103515245 + 12345) & 0x7fffffff; return x / 0x7fffffff; };
}

function buildContractor(row) {
  if (row.id === 'apex') return APEX;
  const rnd = seedRand(row.id);
  const contractNumber = `W91${(row.cage[0]||'0')}QZ-${20+Math.floor(rnd()*5)}-C-${String(1000+Math.floor(rnd()*8999)).slice(0,4)}`;
  const obligatedPct = Math.min(96, Math.max(28, Math.round(row.health*0.6 + 30 + (row.days<60?15:0) )));
  const obligated = Math.round(row.value * obligatedPct/100);
  const monthlyAvg = Math.round(obligated / (10 + Math.floor(rnd()*8)));
  // invoices
  const baseAmt = Math.round(row.value * 0.04);
  const statuses = row.flags >= 4
    ? ['Accepted','Rejected','Pending','Rejected','Pending']
    : row.flags >= 2
      ? ['Accepted','Accepted','Pending','Rejected','Pending']
      : ['Accepted','Accepted','Accepted','Pending','Accepted'];
  const dateList = ['May 22, 2026','June 6, 2026','June 20, 2026','July 2, 2026','July 8, 2026'];
  const invoices = statuses.map((st, i) => {
    const amt = Math.round(baseAmt * (0.7 + rnd()*0.9));
    const color = st==='Accepted'?'green':st==='Pending'?'amber':'red';
    const action = st==='Accepted'?'View':st==='Pending'?'Follow Up':'Resolve Now';
    return { num:`INV-2026-0${210+i}${row.cage[0]}`, amount:amt, date:dateList[i], status:st, color, action, flag: st==='Rejected' };
  });
  const totInv = invoices.reduce((s,x)=>s+x.amount,0);
  const totAcc = invoices.filter(x=>x.status==='Accepted').reduce((s,x)=>s+x.amount,0);
  const totPen = invoices.filter(x=>x.status==='Pending').reduce((s,x)=>s+x.amount,0);
  const totRej = invoices.filter(x=>x.status==='Rejected').reduce((s,x)=>s+x.amount,0);

  const subShift = row.subColor==='red' ? -14 : row.subColor==='amber' ? -8 : +2;
  const mk = (cat, commit) => {
    const actual = Math.max(2, Math.min(commit+8, commit + subShift + Math.round((rnd()-0.5)*6)));
    const diff = actual - commit;
    const status = diff >= 0 ? 'green' : diff >= -5 ? 'amber' : 'red';
    const note = diff >= 1 ? 'On track' : diff >= -3 ? 'Slightly behind' : diff >= -6 ? 'Behind pace' : 'Critically behind';
    return { cat, committed:commit, actual, status, note };
  };
  const esrs = [ mk('SDB',25), mk('WOSB',15), mk('VOSB',10), mk('HUBZone',12), mk('8(a)',20) ];
  const tsbCommit = 82;
  const tsbActual = Math.round(esrs.reduce((s,x)=>s+x.actual,0)/esrs.length * (82/17.4));
  esrs.push({ cat:'Total Small Business', committed:tsbCommit, actual:Math.min(90,tsbActual), status: row.subColor, note: row.subColor==='green'?'On track':row.subColor==='amber'?'Behind pace':'Critically behind' });
  const behind = esrs.filter(e=>e.status==='red').length;

  const cRating = RATING_BY_HEALTH(row.health);
  const cColor = row.health>=78?'green':row.health>=55?'amber':'red';
  const catRatings = CPARS_CATS.map((label,i) => {
    const roll = row.health + (rnd()-0.5)*24;
    const color = roll>=80?'green':roll>=58?'amber':'red';
    const rating = color==='green'?(roll>=90?'Very Good':'Satisfactory'):color==='amber'?'Satisfactory (Declining)':'Marginal';
    return { label, color, rating };
  });
  const trend = row.health < 75 ? 'down' : row.health > 88 ? 'up' : 'flat';

  const auditScore = Math.max(30, Math.min(96, Math.round(row.health*0.85 + 12)));
  const auditLabels = APEX.audit.items.map(x=>x.label);
  const auditItems = auditLabels.map((label,i) => {
    const roll = auditScore + (rnd()-0.5)*40;
    const state = roll>=75?'green':roll>=55?'amber':'red';
    const note = state==='amber'?'Under review':state==='red'?'Missing':undefined;
    return { label, state, note };
  });

  // flags — count matches row.flags
  const flagBank = [
    { sev:'CRITICAL', color:'red', title:'Rejected Invoice Pending Resolution',
      desc:`Invoice ${invoices.find(x=>x.status==='Rejected')?.num || 'on file'} was rejected and exceeds the 5-day resolution threshold with no resubmission recorded.`, action:'Initiate Resolution' },
    { sev:'CRITICAL', color:'red', title:'Subcontracting Plan Critically Behind',
      desc:'One or more small business categories are tracking well below contractual commitment with limited reporting periods remaining. Risk of subcontracting plan default.', action:'Issue Cure Notice Warning' },
    { sev:'CRITICAL', color:'red', title:'CPARS Rating Decline',
      desc:'Overall performance rating has declined across consecutive assessment periods. Cost control and small business dimensions driving the decline.', action:'Schedule Performance Review' },
    { sev:'WARNING', color:'amber', title:`Period of Performance Expires in ${row.days} Days — No Modification On File`,
      desc:`Contract ${contractNumber} period of performance is approaching expiration with no modification or extension currently on file.`, action:'Initiate Mod Request' },
    { sev:'WARNING', color:'amber', title:'Burn Rate Exceeds Obligation Pace',
      desc:'Monthly burn rate projects fund exhaustion ahead of the period of performance end date. Obligation review recommended.', action:'Request Obligation Review' },
    { sev:'CRITICAL', color:'red', title:'Missing Subcontract Consent',
      desc:'Required subcontract consent documentation is not on file, creating audit exposure under DCAA review.', action:'Compile Consent Package' },
  ];
  const flags = flagBank.slice(0, row.flags).map(f => ({ ...f, ref: contractNumber }));

  const monthly = ['Jan','Feb','Mar','Apr','May','Jun'].map((m,i) => ({
    m, v: Math.round(monthlyAvg*(0.82 + rnd()*0.4)), hot: i===5
  }));

  const projMonth = obligatedPct > 80 ? 'July 2026' : obligatedPct > 65 ? 'September 2026' : 'November 2026';

  const reg = [
    { reg:'FAR 52.219-9', name:'Small Business Subcontracting', legacy: row.subColor==='red'?'At risk':'Compliant', legacyColor: row.subColor==='red'?'red':'green', overhaul:'Updated language — review required', overhaulColor:'amber' },
    { reg:'DFARS 252.204-7012', name:'Safeguarding Covered Defense Information', legacy:'Compliant', legacyColor:'green', overhaul:'No change', overhaulColor:'green' },
    { reg:'AFARS 5119.704', name:'Subcontracting Plan Requirements', legacy: row.subColor==='green'?'Compliant':'At risk', legacyColor: row.subColor==='green'?'green':'red', overhaul: row.subColor==='green'?'Enhanced requirements — review':'Enhanced requirements — immediate action', overhaulColor: row.subColor==='green'?'amber':'red' },
  ];

  return {
    id: row.id, name: row.name.includes('LLC')||row.name.includes('Inc')||row.name.includes('Corp')||row.name.includes('Group')?row.name:row.name,
    shortName: row.name, cage: row.cage, contractNumber,
    accCenter: row.accCenter, value: row.value, valueLabel: row.valueLabel,
    popStart: 'January 15, 2024',
    popEnd: (()=>{ // approximate POP end from days
      return 'See portfolio';
    })(),
    contractType: ['Cost Plus Fixed Fee','Firm Fixed Price','Time and Materials','Cost Plus Incentive Fee'][Math.floor(rnd()*4)],
    co: 'J. Reynolds',
    healthScore: row.health, healthStatus: row.healthColor,
    healthPill: row.health>=78?'HEALTHY':row.health>=55?'AT RISK':'CRITICAL',
    activeFlags: row.flags, flagsColor: row.flagsColor,
    cparsRating: row.cpars, cparsColor: cColor,
    subStatus: row.sub, subStatusColor: row.subColor,
    daysToPop: row.days, daysColor: row.days<45?'red':row.days<120?'amber':'green',
    invoices, invoiceTotals: { invoiced: totInv, accepted: totAcc, pending: totPen, rejected: totRej },
    esrs, esrsWarning: behind>=2
      ? `${behind} subcontracting categories are critically behind plan pace. Intervention required before next reporting period.`
      : behind===1 ? 'One subcontracting category is behind plan pace. Monitor before the next reporting period.'
      : 'All subcontracting categories are tracking to or above plan. No intervention required.',
    cpars: {
      overall: cRating.toUpperCase(), overallColor: cColor, trend,
      trendLabel: trend==='down'?'Trending Down across last 2 periods':trend==='up'?'Trending Up across last 2 periods':'Stable across last 2 periods',
      categories: catRatings,
      prev: row.health>=85?'Very Good':row.health>=70?'Satisfactory':'Marginal',
      prev2: row.health>=85?'Very Good':row.health>=70?'Very Good':'Satisfactory',
      note: trend==='down'?'Overall rating has declined. Monitor closely.':trend==='up'?'Overall rating is improving across recent periods.':'Overall rating is stable across recent periods.',
    },
    burn: {
      obligated, total: row.value, pct: obligatedPct, monthlyAvg,
      projected: projMonth, popEndShort: 'per POP schedule',
      gapNote: obligatedPct>78
        ? 'At current burn rate, funds will be exhausted before period of performance ends. Recommend obligation review.'
        : 'Burn rate is tracking within obligation limits. No immediate obligation action required.',
      monthly,
    },
    flags,
    audit: { score: auditScore, items: auditItems },
    regulatory: reg,
    regulatoryNote: 'FAR Overhaul guidance is effective for new solicitations. Clauses affecting this contract require review.',
  };
}

function pdfHeader(doc, title, subtitle) {
  const W = doc.internal.pageSize.getWidth();
  doc.setFillColor.apply(doc, RGB.forest); doc.rect(0, 0, W, 58, 'F');
  doc.setFillColor.apply(doc, RGB.gold); doc.rect(0, 58, W, 3, 'F');
  doc.setTextColor.apply(doc, RGB.gold); doc.setFont('helvetica', 'bold'); doc.setFontSize(15);
  doc.text('COMMANDVIEW', 40, 28);
  doc.setTextColor(226, 203, 132); doc.setFont('helvetica', 'normal'); doc.setFontSize(7);
  doc.text('MISSION VISIBILITY PLATFORM', 40, 40);
  doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
  doc.text(title, W - 40, 26, { align:'right' });
  doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5); doc.setTextColor(219, 224, 208);
  doc.text(subtitle, W - 40, 40, { align:'right' });
  return 80;
}
function pdfSection(doc, y, label) {
  const W = doc.internal.pageSize.getWidth();
  if (y > doc.internal.pageSize.getHeight() - 90) { doc.addPage(); y = 80; }
  doc.setFillColor.apply(doc, RGB.soft); doc.rect(40, y - 11, W - 80, 18, 'F');
  doc.setFillColor.apply(doc, RGB.gold); doc.rect(40, y - 11, 3, 18, 'F');
  doc.setTextColor.apply(doc, RGB.forest); doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
  doc.text(String(label).toUpperCase(), 50, y + 1);
  return y + 22;
}
function pdfKeyVals(doc, y, pairs) {
  const W = doc.internal.pageSize.getWidth();
  const colW = (W - 80) / 2;
  doc.setFontSize(9);
  pairs.forEach((p, i) => {
    const x = 40 + (i % 2) * colW;
    const yy = y + Math.floor(i / 2) * 16;
    doc.setTextColor.apply(doc, RGB.gray); doc.setFont('helvetica', 'normal'); doc.text(String(p[0]), x, yy);
    doc.setTextColor.apply(doc, RGB.charcoal); doc.setFont('helvetica', 'bold'); doc.text(String(p[1]), x + 100, yy);
  });
  return y + Math.ceil(pairs.length / 2) * 16 + 10;
}
function pdfTable(doc, y, head, body) {
  doc.autoTable({
    startY: y, head: [head], body,
    theme: 'grid', margin: { left:40, right:40 },
    headStyles: { fillColor: RGB.forest, textColor: [255,255,255], fontSize: 8, fontStyle: 'bold' },
    bodyStyles: { fontSize: 8, textColor: RGB.charcoal },
    alternateRowStyles: { fillColor: [248, 250, 246] },
    styles: { cellPadding: 4, lineColor: RGB.line, lineWidth: 0.5 },
  });
  return doc.lastAutoTable.finalY + 20;
}
function pdfFooter(doc) {
  const W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight();
  const pages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    doc.setDrawColor.apply(doc, RGB.gold); doc.setLineWidth(2); doc.line(0, H - 30, W, H - 30);
    doc.setFontSize(7); doc.setTextColor.apply(doc, RGB.gray); doc.setFont('helvetica', 'normal');
    doc.text('Powered by Cosby AI Solutions   ·   Secure Government Platform   ·   All Data Encrypted   ·   Audit Logged', 40, H - 16);
    doc.text('Page ' + i + ' of ' + pages, W - 40, H - 16, { align:'right' });
  }
}

  y = pdfSection(doc, y, 'Small Business Subcontracting (eSRS)');

    rec.esrs.map(e => [e.cat, e.committed + '%', e.actual + '%', e.note]));

  y = pdfSection(doc, y, 'CPARS Performance Ratings');
  y = pdfTable(doc, y, ['Assessment Area', 'Rating'],
    [['Overall', rec.cpars.overall]].concat(rec.cpars.categories.map(c => [c.label, c.rating])));

  y = pdfSection(doc, y, 'Obligation & Burn Rate (SDW)');

  ]);

  y = pdfSection(doc, y, 'DCAA Audit Readiness  (Score ' + rec.audit.score + '/100)');
  y = pdfTable(doc, y, ['Readiness Item', 'Status'],
    rec.audit.items.map(it => [it.label, it.state === 'green' ? 'On File / Complete' : (it.note || (it.state === 'red' ? 'Missing' : 'Review'))]));

  if (rec.flags && rec.flags.length) {
    y = pdfSection(doc, y, 'Open Risk Flags & Recommended Actions');
    y = pdfTable(doc, y, ['Severity', 'Finding', 'Recommended Action'],
      rec.flags.map(f => [f.sev, f.title, f.action]));
  }

  y = pdfSection(doc, y, 'Regulatory & FAR Monitoring');
  y = pdfTable(doc, y, ['Regulation', 'Legacy FAR', 'FAR Overhaul'],
    rec.regulatory.map(r => [r.reg + ' — ' + r.name, r.legacy, r.overhaul]));

  pdfFooter(doc);
  doc.save('CommandView_' + safeName(title) + '_' + safeName(rec.shortName) + '_' + pdfDateSlug() + '.pdf');
}

// persistence: store only user additions and replay them over the deterministic seed
const CV_LS_KEY = 'commandview_demo_v1';
let CV_CUSTOM = { contractors: [], contracts: {} };
function cvSave() { try { localStorage.setItem(CV_LS_KEY, JSON.stringify(CV_CUSTOM)); } catch (e) {} }

function addContractor(form, opts = {}) {
  const seed = form.id || (cvSlug(form.name) + '_' + Date.now().toString(36) + Math.floor(Math.random() * 1e4).toString(36));
  const f = { ...form, id: seed };
  const rec = buildContractor(rowFromForm(f));
  if (f.contractNumber) rec.contractNumber = f.contractNumber;
  if (f.contractType) rec.contractType = f.contractType;
  rec.valueLabel = abbrMoney(f.value); rec.value = f.value;
  rec.contracts = [primaryContract(rec)];
  rec.custom = true;
  CONTRACTORS[seed] = rec;
  if (opts.persist !== false) { CV_CUSTOM.contractors.push(f); cvSave(); }
  if (opts.emit !== false) cvStore.emit();
  return seed;
}

function addContractToContractor(id, contract, opts = {}) {
  const rec = CONTRACTORS[id];
  if (!rec) return;
  rec.contracts = (rec.contracts || []).concat([contract]);
  if (opts.persist !== false) { (CV_CUSTOM.contracts[id] = CV_CUSTOM.contracts[id] || []).push(contract); cvSave(); }
  if (opts.emit !== false) cvStore.emit();
}

(function cvLoad() {
  try {
    const raw = localStorage.getItem(CV_LS_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    CV_CUSTOM = { contractors: parsed.contractors || [], contracts: parsed.contracts || {} };
    CV_CUSTOM.contractors.forEach(f => addContractor(f, { persist: false, emit: false }));
    Object.keys(CV_CUSTOM.contracts).forEach(id => {
      (CV_CUSTOM.contracts[id] || []).forEach(c => addContractToContractor(id, c, { persist: false, emit: false }));
    });
  } catch (e) { console.warn('CommandView: could not restore saved data', e); }
})();

const csvEscape = (v) => { const s = (v === null || v === undefined) ? '' : String(v); return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
const toCSV = (headers, rows) => [headers.map(csvEscape).join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\r\n');
const downloadBlob = (data, filename, type) => {
  try {
    const blob = new Blob([data], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (e) { console.error('Export failed', e); alert('Export failed: ' + e.message); }
};
const downloadCSV = (filename, headers, rows) => downloadBlob('﻿' + toCSV(headers, rows), filename, 'text/csv;charset=utf-8;');
const downloadJSON = (filename, obj) => downloadBlob(JSON.stringify(obj, null, 2), filename, 'application/json');

/* ============================================================
   AUTO-WIDTH CHART WRAPPER
   Deterministic replacement for Recharts ResponsiveContainer:
   measures its own width (ResizeObserver + window resize + delayed
   fallback) and passes an explicit pixel width to the chart, so
   charts always draw even where ResizeObserver is unreliable.
============================================================ */
const AutoWidth = ({ height, children }) => {
  const ref = useRef(null);
  const [w, setW] = useState(0);
  useEffect(() => {
    const measure = () => { if (ref.current) { const nw = ref.current.offsetWidth; if (nw > 0) setW(nw); } };
    measure();
    const t1 = setTimeout(measure, 40);
    const t2 = setTimeout(measure, 200);
    let ro = null;
    if (typeof ResizeObserver !== 'undefined' && ref.current) { ro = new ResizeObserver(measure); ro.observe(ref.current); }
    window.addEventListener('resize', measure);
    return () => { clearTimeout(t1); clearTimeout(t2); window.removeEventListener('resize', measure); if (ro) ro.disconnect(); };
  }, []);
  return <div ref={ref} style={{ width:'100%', height }}>{w > 0 ? children(w) : null}</div>;
};

const Th = ({ label, sortKey, sort, setSort, align='left', className='' }) => {

function useSort(initialKey) {
  const [sort, setSort] = useState({ key: initialKey, dir: 'asc' });
  const apply = (arr, accessors) => {
    const acc = accessors[sort.key];
    if (!acc) return arr;
    const sorted = [...arr].sort((a,b) => {
      const va = acc(a), vb = acc(b);
      if (typeof va === 'number' && typeof vb === 'number') return va - vb;
      return String(va).localeCompare(String(vb));
    });
    return sort.dir === 'asc' ? sorted : sorted.reverse();
  };
  return { sort, setSort, apply };
}

/* Progress-then-success flow used by tool/report buttons */
function useTaskModal() {
  const [state, setState] = useState(null); // {phase:'progress'|'done', title, docs, sub}
  const timer = useRef(null);
  const run = (opts) => {
    setState({ phase:'progress', progress:0, ...opts });
    let p = 0;
    clearInterval(timer.current);
    timer.current = setInterval(() => {
      p += Math.random()*18 + 8;
      if (p >= 100) {
        p = 100;
        clearInterval(timer.current);
        setState(s => s ? ({ ...s, progress:100 }) : s);
        setTimeout(() => setState(s => s ? ({ ...s, phase:'done' }) : s), 400);
      } else {
        setState(s => s ? ({ ...s, progress:p }) : s);
      }
    }, 220);
  };
  const close = () => { clearInterval(timer.current); setState(null); };
  return { state, run, close };
}

const PortfolioTable = ({ onSelect, activeId, compact }) => {
  const role = useRole();
  useCvVersion();
  const { sort, setSort, apply } = useSort('health');
  const [q, setQ] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [fHealth, setFHealth] = useState('all');
  const [fFlags, setFFlags] = useState('all');
  const [fCpars, setFCpars] = useState('all');
  const [fSub, setFSub] = useState('all');

  const allRows = liveRows();
  const filtered = allRows.filter(r => {
    if (q && !(r.name.toLowerCase().includes(q.toLowerCase()) || r.cage.toLowerCase().includes(q.toLowerCase()) )) return false;
    if (fHealth==='high' && r.health<80) return false;
    if (fHealth==='mid' && !(r.health>=55 && r.health<80)) return false;
    if (fHealth==='low' && r.health>=55) return false;
    if (fFlags==='none' && r.flags!==0) return false;
    if (fFlags==='some' && !(r.flags>=1 && r.flags<=2)) return false;
    if (fFlags==='many' && r.flags<3) return false;
    if (fCpars!=='all' && r.cpars!==fCpars) return false;
    if (fSub!=='all' && r.sub!==fSub) return false;
    return true;
  });

  const rows = apply(filtered, {
    name:r=>r.name, cage:r=>r.cage, value:r=>r.value, health:r=>r.health,
    flags:r=>r.flags, cpars:r=>r.cpars, sub:r=>r.sub, days:r=>r.days,
  });

  const Select = ({ value, onChange, children, label }) => (
    <label className="flex flex-col gap-1">
      <span className="text-[10px] font-bold uppercase tracking-wide" style={{ color:'#7a8270' }}>{label}</span>
      <select value={value} onChange={e=>onChange(e.target.value)}
        className="text-[12px] px-2.5 py-2 bg-white outline-none" style={{ border:'1px solid #d7dbd1', color:C.charcoal }}>
        {children}
      </select>
    </label>
  );

  return (
    <Panel title="AMC Contractor Portfolio — Health Overview"
      tag={<SourceTag label={`${rows.length} of ${allRows.length}`}/>}
      right={<div className="flex items-center gap-2">
        <Btn size="sm" color="charcoal" type="outline" icon={I.Download} locked={!role.canGenerate} onClick={()=>exportPortfolioCSV(rows)}>Export</Btn>
        <Btn size="sm" color="forest" icon={I.Users} locked={!role.canManage} onClick={()=>setShowAdd(true)}>Add Contractor</Btn>
      </div>}>
      {/* filters */}
      <div className="flex flex-wrap items-end gap-3 mb-4 pb-4 border-b" style={{ borderColor:'#eceee9' }}>
        <label className="flex flex-col gap-1 flex-1 min-w-[220px]">
          <span className="text-[10px] font-bold uppercase tracking-wide" style={{ color:'#7a8270' }}>Search</span>
          <span className="flex items-center border px-2.5" style={{ borderColor:'#d7dbd1' }}>
            <I.Search size={14} style={{ color:C.gray }}/>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Contractor name or CAGE code"
              className="w-full px-2 py-2 text-[12px] outline-none"/>
          </span>
        </label>
        <Select label="Health Score" value={fHealth} onChange={setFHealth}>
          <option value="all">All</option>
          <option value="high">80–100 (Healthy)</option>
          <option value="mid">55–79 (At Risk)</option>
          <option value="low">Below 55 (Critical)</option>
        </Select>
        <Select label="Active Flags" value={fFlags} onChange={setFFlags}>
          <option value="all">All</option>
          <option value="none">0 flags</option>
          <option value="some">1–2 flags</option>
          <option value="many">3+ flags</option>
        </Select>
        <Select label="CPARS Rating" value={fCpars} onChange={setFCpars}>
          <option value="all">All</option>
          <option>Outstanding</option><option>Very Good</option><option>Satisfactory</option>
          <option>Marginal</option><option>Unsatisfactory</option>
        </Select>
        <Select label="Subcontracting" value={fSub} onChange={setFSub}>
          <option value="all">All</option>
          <option>On Track</option><option>At Risk</option><option>Critical</option>
        </Select>
      </div>

      <div className="overflow-x-auto">
        <table className="w-full text-[13px]">
          <thead>
            <tr className="border-b" style={{ borderColor:'#eceee9', background:'#fafbf8' }}>
              <Th label="Contractor" sortKey="name" sort={sort} setSort={setSort}/>
              <Th label="CAGE" sortKey="cage" sort={sort} setSort={setSort}/>
              <Th label="Value" sortKey="value" sort={sort} setSort={setSort} align="right"/>
              <Th label="Health" sortKey="health" sort={sort} setSort={setSort} align="right"/>
              <Th label="Flags" sortKey="flags" sort={sort} setSort={setSort} align="center"/>
              <Th label="CPARS" sortKey="cpars" sort={sort} setSort={setSort}/>
              <Th label="Subcontracting" sortKey="sub" sort={sort} setSort={setSort}/>
              <Th label="Days to POP" sortKey="days" sort={sort} setSort={setSort} align="right"/>
              <Th label="Action" align="right"/>
            </tr>
          </thead>
          <tbody>
            {rows.map((r)=>(
              <tr key={r.id} onClick={()=>onSelect(r.id)}
                  className="border-b cursor-pointer transition-colors"
                  style={{ borderColor:'#f2f3ef', background: activeId===r.id ? '#eef3e8' : 'transparent' }}
                  onMouseEnter={e=>{ if(activeId!==r.id) e.currentTarget.style.background='#fafbf8'; }}
                  onMouseLeave={e=>{ if(activeId!==r.id) e.currentTarget.style.background='transparent'; }}>
                <td className="px-3 py-3 font-semibold" style={{ color:C.charcoal }}>
                  {activeId===r.id && <span className="inline-block w-1 h-4 mr-2 align-middle" style={{ background:C.gold }}/>}
                  {r.name}
                  <span className="block text-[10px] font-normal" style={{ color:C.gray }}>{r.accCenter}</span>
                </td>
                <td className="px-3 py-3 font-mono text-[12px]" style={{ color:C.gray }}>{r.cage}</td>
                <td className="px-3 py-3 text-right font-semibold" style={{ color:C.charcoal }}>{r.valueLabel}</td>
                <td className="px-3 py-3 text-right"><span className="font-extrabold text-[15px]" style={{ color:statusColor(r.healthColor) }}>{r.health}</span></td>
                <td className="px-3 py-3 text-center">
                  {r.flags>0
                    ? <span className="inline-flex items-center justify-center min-w-[22px] h-[22px] px-1.5 text-[12px] font-bold text-white" style={{ background:statusColor(r.flagsColor) }}>{r.flags}</span>
                    : <span className="text-[12px]" style={{ color:C.forest }}>—</span>}
                </td>
                <td className="px-3 py-3 text-[12px]" style={{ color:C.charcoal }}>{r.cpars}</td>
                <td className="px-3 py-3"><Pill color={r.subColor} small>{r.sub}</Pill></td>
                <td className="px-3 py-3 text-right font-semibold" style={{ color: r.days<45?C.critical:r.days<120?C.goldDark:C.charcoal }}>{r.days}</td>
                <td className="px-3 py-3 text-right"><button onClick={(e)=>{e.stopPropagation(); onSelect(r.id);}} className="text-[12px] font-semibold hover:underline" style={{ color:C.forest }}>View</button></td>
              </tr>
            ))}
            {rows.length===0 && <tr><td colSpan={9} className="px-3 py-10 text-center text-[13px]" style={{ color:C.gray }}>No contractors match the current filters.</td></tr>}
          </tbody>
        </table>
      </div>
      <AddContractorModal open={showAdd} onClose={()=>setShowAdd(false)} onCreated={(id)=>{ setShowAdd(false); onSelect(id); }}/>
    </Panel>
  );
};

const ReportCard = ({ r, onGenerate }) => {
  const role = useRole();
  const [state, setState] = useState('idle'); // idle | working | done
  const [prog, setProg] = useState(0);
  const t = useRef(null);
  const start = () => {
    setState('working'); setProg(0);
    let p=0; clearInterval(t.current);
    t.current = setInterval(()=>{ p+=Math.random()*16+7; if(p>=100){p=100;clearInterval(t.current);setProg(100);setTimeout(()=>setState('done'),350);} else setProg(p); },210);
  };
  return (
    <div className="bg-white p-6 flex flex-col shadow-card" style={{ border:'1px solid #e3e6df', borderTop:`3px solid ${C.forest}` }}>
      <div className="flex items-center gap-3 mb-3">

        <h3 className="font-bold text-[16px]" style={{ color:C.charcoal }}>{r.title}</h3>
      </div>
      <p className="text-[13px] leading-relaxed flex-1 mb-5" style={{ color:'#5a6152' }}>{r.desc}</p>
      {state==='idle' && <Btn color="forest" icon={I.FileText} locked={!role.canGenerate} onClick={start}>Generate Report</Btn>}
      {state==='working' && (
        <div>
          <div className="h-2.5 w-full overflow-hidden" style={{ background:C.track }}>
            <div className="h-full transition-all duration-200" style={{ width:`${prog}%`, background:C.forest }}/>
          </div>
          <p className="mt-2 text-[11px] font-semibold uppercase tracking-wide" style={{ color:C.forest }}>{Math.round(prog)}% — {prog<45?'Aggregating data':prog<80?'Rendering report':'Finalizing PDF'}</p>
        </div>
      )}
      {state==='done' && (
        <div className="cv-fade">
          <div className="flex items-center gap-2 mb-3">
            <I.CheckCircle size={20} style={{ color:C.forest }}/>
            <span className="font-bold text-[14px]" style={{ color:C.charcoal }}>Report Ready</span>
          </div>
          <div className="flex gap-3">
            <Btn color="forest" full size="sm" icon={I.Download} onClick={()=>generateCommandViewPdf({ kind:r.kind })}>Download PDF</Btn>
            <Btn color="gold" full size="sm" icon={I.Mail} onClick={()=>setState('idle')}>Share via Email</Btn>
          </div>
        </div>
      )}
    </div>
  );
};

const AI_SUGGESTIONS = [
  'Which contractors are approaching their period of performance end?',
  'Which contracts have critical subcontracting compliance gaps?',
  'Show me all rejected invoices across my portfolio.',
  'Which contractors are at highest risk of cure notice?',
  'Generate a summary report for Apex Defense Solutions.',
];

// Rich, data-referencing responses (React nodes)
const aiRespond = (q) => {
  const H = ({children}) => <div className="font-bold text-[13px] mt-3 mb-1.5" style={{ color:C.charcoal }}>{children}</div>;
  const P = ({children}) => <p className="text-[12.5px] leading-relaxed mb-2" style={{ color:'#3f463a' }}>{children}</p>;
  const B = ({children}) => <li className="text-[12.5px] leading-relaxed flex gap-2 mb-1.5"><span style={{ color:C.gold }}>▸</span><span style={{ color:'#3f463a' }}>{children}</span></li>;
  const UL = ({children}) => <ul className="mb-2">{children}</ul>;

  const rows = liveRows();
  const recOf = (id) => CONTRACTORS[id];

  if (q.includes('period of performance')) {
    const near = rows.filter(r=>r.days<=120).sort((a,b)=>a.days-b.days);
    return (
      <div>
        <P>{near.length} contractor{near.length!==1?'s':''} in your portfolio {near.length!==1?'are':'is'} within 120 days of period of performance end. Ranked by urgency:</P>
        <UL>
          {near.map(r=><B key={r.id}><b>{r.name}</b> ({r.cage}) — <b style={{color: r.days<45?C.critical:C.goldDark}}>{r.days} days</b> · {r.valueLabel} · Health {r.health}</B>)}
        </UL>
        <H>Recommended Action</H>
        {near.length
          ? <P><b>{near[0].name} ({near[0].days} days)</b> is the most urgent{near[1] ? <> , followed by <b>{near[1].name} ({near[1].days} days)</b></> : null}. Any contractor inside 90 days with no modification on file should have a mod request initiated now to prevent a lapse.</P>
          : <P>No contractors are within 120 days of period of performance end. No immediate action required.</P>}
      </div>
    );
  }
  if (q.includes('subcontracting')) {
    const crit = rows.filter(r=>r.subColor==='red').sort((a,b)=>a.health-b.health);
    const worst = crit[0] ? recOf(crit[0].id) : null;
    return (
      <div>
        <P>{crit.length} contractor{crit.length!==1?'s':''} {crit.length!==1?'have':'has'} critical subcontracting compliance status.{worst ? <> The most severe gap is on <b>{worst.shortName}</b>:</> : ''}</P>
        {worst && <>
          <H>{worst.shortName} — {worst.contractNumber}</H>
          <UL>{worst.esrs.filter(e=>e.status==='red' || e.cat==='Total Small Business').map((e,i)=><B key={i}><b>{e.cat}: {e.actual}% actual vs {e.committed}% committed</b> — {e.note}</B>)}</UL>
        </>}
        {crit.length>0 && <>
          <H>Portfolio-Wide Critical</H>
          <UL>{crit.map(r=><B key={r.id}><b>{r.name}</b> — subcontracting status <b style={{color:C.critical}}>Critical</b></B>)}</UL>
        </>}
        <P>Recommend issuing cure notice warnings before the next eSRS reporting cycle for any contractor at risk of subcontracting plan default.</P>
      </div>
    );
  }
  if (q.includes('rejected invoice')) {
    const list = [];
    rows.forEach(r=>{ (recOf(r.id).invoices||[]).filter(iv=>iv.status==='Rejected').forEach(iv=>list.push({ c:r.name, iv })); });
    list.sort((a,b)=>b.iv.amount-a.iv.amount);
    const top = list[0];
    return (
      <div>
        <P>{list.length} rejected invoice{list.length!==1?'s':''} {list.length!==1?'are':'is'} currently open across your portfolio, totaling <b style={{color:C.critical}}>{money0(list.reduce((s,x)=>s+x.iv.amount,0))}</b>:</P>
        <UL>{list.map((x,i)=><B key={i}><b>{x.iv.num}</b> — {x.c} · <b style={{color:C.critical}}>{money0(x.iv.amount)}</b> · rejected {x.iv.date}</B>)}</UL>
        {top && <>
          <H>Highest Priority</H>
          <P><b>{top.c}</b> invoice <b>{top.iv.num} ({money0(top.iv.amount)})</b> is the largest open rejection and should be resolved first. Rejections open past the 5-day threshold with no resubmission are flagged critical.</P>
        </>}
      </div>
    );
  }
  if (q.includes('cure notice')) {
    const risk = rows.filter(r=>r.health<60 || r.flags>=4).sort((a,b)=>a.health-b.health);
    return (
      <div>
        <P>Based on health score, open flags, CPARS rating, and subcontracting status, {risk.length} contractor{risk.length!==1?'s':''} carr{risk.length!==1?'y':'ies'} the highest cure notice risk:</P>
        <UL>{risk.map(r=><B key={r.id}><b>{r.name}</b> — Health <b style={{color:C.critical}}>{r.health}</b> · {r.flags} flags · CPARS {r.cpars}</B>)}</UL>
        <H>Assessment</H>
        {risk[0]
          ? <P><b>{risk[0].name} (Health {risk[0].health}, {risk[0].flags} flags, {risk[0].cpars})</b> is the leading candidate{risk[1] ? <>, with <b>{risk[1].name}</b> a close second</> : null}. An Unsatisfactory or Marginal CPARS rating combined with multiple open flags and a short POP window is a defensible basis for a cure notice.</P>
          : <P>No contractors currently meet the cure notice risk threshold. Portfolio is in good standing.</P>}
      </div>
    );
  }
  // executive summary — match a contractor named in the query, else default to Apex
  let target = null;
  for (const r of rows) { if (q.includes(r.name.toLowerCase()) || (r.cage && q.includes(r.cage.toLowerCase()))) { target = recOf(r.id); break; } }
  if (!target) target = CONTRACTORS['apex'] || recOf(rows[0].id);
  const d = target;
  const rej = (d.invoices||[]).filter(iv=>iv.status==='Rejected');
  const hub = (d.esrs||[]).find(e=>e.cat==='HUBZone');
  return (
    <div>
      <H>{d.shortName} — Executive Summary</H>
      <P>CAGE {d.cage} · {d.contractNumber} · {d.accCenter} · {d.valueLabel} {d.contractType}</P>
      <UL>
        <B><b>Health Score {d.healthScore}/100</b> — {d.healthPill}{d.cpars.trend==='down'?', trending down':''}</B>
        <B><b>{d.activeFlags} open risk flag{d.activeFlags!==1?'s':''}</b>{d.flags && d.flags.length ? <> — e.g. {d.flags[0].title}</> : null}</B>
        <B><b>CPARS: {d.cparsRating}</b> — {d.cpars.note}</B>
        <B><b>Burn rate {d.burn.pct}%</b> — {abbrMoney(d.burn.obligated)} of {abbrMoney(d.burn.total)}; funds project to exhaust {d.burn.projected}</B>
        <B><b>Subcontracting: {d.subStatus}</b>{hub ? <> — HUBZone {hub.actual}% vs {hub.committed}% committed</> : null}</B>
        <B><b>DCAA audit readiness {d.audit.score}/100</b> — {d.audit.items.filter(i=>i.state!=='green').length} open item{d.audit.items.filter(i=>i.state!=='green').length!==1?'s':''}</B>
      </UL>
      <H>Bottom Line</H>
      <P>{d.shortName} is monitored across {(d.contracts||[]).length} active contract vehicle{(d.contracts||[]).length!==1?'s':''}. {rej.length ? `There ${rej.length===1?'is':'are'} ${rej.length} open invoice rejection${rej.length!==1?'s':''} totaling ${money0(rej.reduce((s,x)=>s+x.amount,0))}. ` : ''}{d.daysToPop<120 ? `With ${d.daysToPop} days to POP end, confirm a modification is on file. ` : ''}Overall posture is {String(d.healthPill).toLowerCase()}.</P>
    </div>
  );
};

/* ============================================================
   SESSION TIMEOUT — real inactivity-based auto-logout with warning
============================================================ */
const SESSION_DEFAULT_MIN = 2;   // demo-friendly default; adjustable in Settings
const SESSION_WARN_SEC = 60;     // warning window (seconds) before auto-logout
const getSessionTimeoutMin = () => {
  const v = cvLoadSettings().sessionTimeoutMin;
  return (v === undefined || v === null) ? SESSION_DEFAULT_MIN : Number(v);
};

const SessionTimeout = ({ onLogout }) => {
  const [warning, setWarning] = useState(false);
  const [remaining, setRemaining] = useState(SESSION_WARN_SEC);
  const lastActivity = useRef(Date.now());
  const warnRef = useRef(false);

  const resetSession = () => { lastActivity.current = Date.now(); warnRef.current = false; setWarning(false); };

  useEffect(() => {
    const onActivity = () => { if (!warnRef.current) lastActivity.current = Date.now(); };
    const evts = ['mousedown', 'mousemove', 'keydown', 'scroll', 'touchstart', 'wheel', 'click'];
    evts.forEach(e => window.addEventListener(e, onActivity, { passive: true }));

    const evaluate = () => {
      const min = getSessionTimeoutMin();
      if (!min || min <= 0) { if (warnRef.current) { warnRef.current = false; setWarning(false); } return; }
      const totalMs = min * 60000;
      const warnMs = Math.min(SESSION_WARN_SEC * 1000, totalMs / 2);
      const idle = Date.now() - lastActivity.current;
      if (idle >= totalMs) { warnRef.current = false; onLogout(); return; }
      if (idle >= totalMs - warnMs) {
        warnRef.current = true;
        setWarning(true);
        setRemaining(Math.max(0, Math.ceil((totalMs - idle) / 1000)));
      } else if (warnRef.current) {
        warnRef.current = false;
        setWarning(false);
      }
    };

    const tick = setInterval(evaluate, 1000);
    const onVis = () => { if (document.visibilityState === 'visible') evaluate(); };
    document.addEventListener('visibilitychange', onVis);

    return () => { clearInterval(tick); document.removeEventListener('visibilitychange', onVis); evts.forEach(e => window.removeEventListener(e, onActivity)); };
  }, []);

  const mm = Math.floor(remaining / 60);
  const ss = String(remaining % 60).padStart(2, '0');
  const pct = Math.max(0, Math.min(100, (remaining / SESSION_WARN_SEC) * 100));

  return (
    <Modal open={warning} onClose={undefined}>
      <div>
        <div className="flex items-center gap-2.5 px-6 py-4 border-b" style={{ borderColor:'#eceee9' }}>
          <span className="flex items-center justify-center w-8 h-8" style={{ background:`${C.critical}1a` }}><I.Clock size={17} style={{ color:C.critical }}/></span>
          <h3 className="font-bold text-[15px]" style={{ color:C.charcoal }}>Session Timeout Warning</h3>
        </div>
        <div className="px-6 py-6 text-center">
          <p className="text-[13px] leading-relaxed mb-4" style={{ color:'#5a6152' }}>
            Your session is about to expire due to inactivity. For your security, you will be automatically logged out.
          </p>
          <div className="text-[40px] font-extrabold tabular-nums leading-none" style={{ color:C.critical }}>{mm}:{ss}</div>
          <div className="text-[10px] font-bold uppercase tracking-wide mt-1 mb-4" style={{ color:C.gray }}>Time Remaining</div>
          <div className="h-2 w-full overflow-hidden mb-5" style={{ background:C.track }}>
            <div className="h-full transition-all duration-1000 ease-linear" style={{ width:`${pct}%`, background:C.critical }}/>
          </div>
          <div className="flex gap-3">
            <Btn color="forest" full icon={I.Refresh} onClick={resetSession}>Continue Session</Btn>
            <Btn color="charcoal" type="outline" full icon={I.Lock} onClick={()=>{ warnRef.current=false; onLogout(); }}>Log Out Now</Btn>
          </div>
          <p className="text-[10px] mt-4" style={{ color:C.gray }}>Session activity is logged to the audit trail per U.S. Government policy.</p>
        </div>
      </div>
    </Modal>
  );
};

const App = () => {
  const [loggedIn, setLoggedIn] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [roleKey, setRoleKey] = useState('ko');

  const task = useTaskModal();
  const role = ROLES[roleKey] || ROLES.ko;

  const changeRole = (k) => { setRoleKey(k); if (!ROLES[k].pages.includes(page)) setPage('dashboard'); };

  useEffect(()=>{ window.scrollTo(0,0); }, [page]);

  return (

        {page==='contractors' && <ContractorsPage selectedId={selectedId} setSelectedId={setSelectedId} setPage={setPage}/>}
        {page==='compliance'  && <CompliancePage selectedId={selectedId} task={task}/>}
        {page==='audit'       && <AuditPage selectedId={selectedId} task={task}/>}

      <SessionTimeout onLogout={()=>{ setLoggedIn(false); setPage('dashboard'); }}/>
    </div>
    </RoleCtx.Provider>
  );
};
